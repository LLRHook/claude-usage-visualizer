name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project macos/ClaudeUsageBar.xcodeproj \
            -scheme ClaudeUsageBar

      - name: Build
        run: make build
