name: ClaudeUsageBar

options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.8.1"

targets:
  ClaudeUsageBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/ClaudeUsageBar
        excludes:
          - "Resources/**"
    resources:
      - path: Sources/ClaudeUsageBar/Resources
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        SUFeedURL: ""
        SUPublicEDKey: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.ClaudeUsageBar
        PRODUCT_NAME: Claude Usage Bar
        PRODUCT_MODULE_NAME: ClaudeUsageBar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageBar.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Sparkle

  ClaudeUsageBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ClaudeUsageBarTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Usage Bar.app/Contents/MacOS/Claude Usage Bar"
    dependencies:
      - target: ClaudeUsageBar
